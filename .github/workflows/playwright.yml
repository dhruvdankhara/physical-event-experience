name: Playwright E2E

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: "true"
          AUTH_JWT_SECRET: playwright-ci-auth-secret-1234567890
          AUTH_COOKIE_NAME: stadium_sync_session
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: playwright-google-maps-key-1234567890
          GOOGLE_OAUTH_CLIENT_ID: playwright-client-id
          GOOGLE_OAUTH_CLIENT_SECRET: playwright-client-secret
          GOOGLE_OAUTH_CALLBACK_URL: http://127.0.0.1:3000/api/auth/google/callback
          GOOGLE_CLOUD_PROJECT_ID: playwright-project
          FIRESTORE_PROJECT_ID: playwright-project
          FIRESTORE_DATABASE_ID: "(default)"
          GOOGLE_CLOUD_LOCATION: us-central1
          GOOGLE_VERTEX_MODEL: gemini-2.0-flash-001
          GOOGLE_TTS_LANGUAGE_CODE: en-IN
          GOOGLE_TTS_VOICE_NAME: en-IN-Standard-B

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright traces and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
